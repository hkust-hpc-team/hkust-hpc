ci:
  autofix_commit_msg: "chore(pre-commit): auto fixes"
  autofix_prs: true
  autoupdate_commit_msg: "chore(pre-commit): update hook revs"
  autoupdate_schedule: quarterly
  # Skip hooks that require uv (language: system) -- pre-commit.ci doesn't have uv
  skip: [doc8, rstcheck, ruff-check, ruff-format]
minimum_pre_commit_version: "3.6.0"
# external-resources/ contains archived Drupal HTML and welcome-email files
# used as read-only reference material. They are never committed and should
# not be linted or reformatted.
exclude: ^external-resources/
repos:
  # ---------- managed by pre-commit (no uv needed) ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format YAML and Markdown files
        types_or: [yaml, markdown]
        args: ["--print-width", "120"]

  # ---------- language: system -- versions from uv.lock ----------
  - repo: local
    hooks:
      - id: doc8
        name: doc8 (RST style)
        entry: uv run doc8
        language: system
        files: '\.rst$'
        types: [rst]

      - id: rstcheck
        name: rstcheck (RST syntax)
        entry: uv run rstcheck --config pyproject.toml
        language: system
        files: '\.rst$'
        types: [rst]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        files: '\.py$'
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        files: '\.py$'
        types: [python]
