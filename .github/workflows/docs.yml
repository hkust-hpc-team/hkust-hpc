name: docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build docs
        run: uv run sphinx-build -M html "docs/src" "build" -j auto -W --keep-going

  trigger-rtd:
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Trigger Read the Docs build
        run: |
          curl -fsSX POST \
            -d "token=${{ secrets.RTD_TOKEN }}&branches=main" \
            "https://app.readthedocs.org/api/v2/webhook/${{ vars.RTD_PROJECT_SLUG }}/${{ vars.RTD_WEBHOOK_ID }}/"
