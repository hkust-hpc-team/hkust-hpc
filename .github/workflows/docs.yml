name: docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build docs
        run: uv run sphinx-build -M html "docs/src" "build" -j auto -W --keep-going

  trigger-rtd:
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Determine RTD version slug
        id: rtd-version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "slug=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "slug=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Read the Docs build
        run: |
          curl -fsSX POST \
            -H "Authorization: Token ${{ secrets.RTD_TOKEN }}" \
            "https://app.readthedocs.org/api/v3/projects/${{ vars.RTD_PROJECT_SLUG }}/versions/${{ steps.rtd-version.outputs.slug }}/builds/"
