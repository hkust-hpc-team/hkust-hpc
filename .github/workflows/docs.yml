name: docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build docs
        run: uv run sphinx-build -M html "docs/src" "build" -j auto -W --keep-going

  trigger-rtd:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Determine RTD version slug
        id: rtd-version
        run: echo "slug=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Verify RTD configuration
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
          RTD_SLUG: ${{ vars.RTD_PROJECT_SLUG }}
        run: |
          if [ -z "$RTD_TOKEN" ]; then
            echo "::error::RTD_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$RTD_SLUG" ]; then
            echo "::error::RTD_PROJECT_SLUG variable is not set"
            exit 1
          fi

          echo "Project slug: $RTD_SLUG"
          echo "Version slug: ${{ steps.rtd-version.outputs.slug }}"

          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Token $RTD_TOKEN" \
            "https://app.readthedocs.org/api/v3/projects/$RTD_SLUG/")

          echo "RTD API auth check - HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::RTD API auth check failed (HTTP $HTTP_CODE). Verify RTD_TOKEN is a valid API token."
            exit 1
          fi

      - name: Trigger Read the Docs build
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
          RTD_SLUG: ${{ vars.RTD_PROJECT_SLUG }}
          RTD_VERSION: ${{ steps.rtd-version.outputs.slug }}
        run: |
          URL="https://app.readthedocs.org/api/v3/projects/${RTD_SLUG}/versions/${RTD_VERSION}/builds/"
          echo "→ POST ${URL}"
          HTTP_CODE=$(curl -sS -o /tmp/rtd-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Token ${RTD_TOKEN}" \
            "${URL}")
          echo "← HTTP ${HTTP_CODE}"
          cat /tmp/rtd-response.json 2>/dev/null || true
          echo ""
          if [ -z "$HTTP_CODE" ] || ! [ "$HTTP_CODE" -eq "$HTTP_CODE" ] 2>/dev/null; then
            echo "::error::Failed to reach Read the Docs API"
            exit 1
          fi
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]
